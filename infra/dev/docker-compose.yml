services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${PG_USER:-devuser}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-devpass}
      POSTGRES_DB: appdb
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # 앱에서 localhost:5432로 직접 접근
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-devuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"   # 앱에서 localhost:6379로 직접 접근

