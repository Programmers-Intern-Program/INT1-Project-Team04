services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prod-postgres
    restart: always
    command: >
      postgres
      -c shared_buffers=2GB
      -c max_connections=200
      -c work_mem=16MB
    deploy:
      resources:
        limits:
          memory: 8g
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: appdb
      TZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: prod-redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 900mb
      --maxmemory-policy volatile-lru
    volumes:
      - redisdata:/data
    networks:
      - prod-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MCP Server ────────────────────────────────────────────
  mcp-server:
    image: ghcr.io/${GITHUB_ORG}/mcp-server:${TAG:-latest}
    container_name: prod-mcp
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: http://prod-langfuse-web:3000
      TZ: Asia/Seoul
    networks:
      - prod-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── ClickHouse (Langfuse V3) ──────────────────────────────────
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:23
    container_name: prod-langfuse-clickhouse
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    networks:
      - prod-net
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhousedata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Langfuse (self-hosted) ─────────────────────────────────
  langfuse-web:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: prod-langfuse-web
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@prod-postgres:5432/langfuse
      CLICKHOUSE_URL: clickhouse://langfuse:langfuse_password@prod-langfuse-clickhouse:8123/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse_password@prod-langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse_password
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin123
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      NEXTAUTH_URL: https://${LANGFUSE_DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@prod-redis:6379
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      TZ: Asia/Seoul
    networks:
      - prod-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy

  langfuse-worker:
    image: ghcr.io/langfuse/langfuse-worker:latest
    container_name: prod-langfuse-worker
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@prod-postgres:5432/langfuse
      CLICKHOUSE_URL: clickhouse://langfuse:langfuse_password@prod-langfuse-clickhouse:8123/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse_password@prod-langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse_password
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin123
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@prod-redis:6379
      SALT: ${LANGFUSE_SALT}
      TZ: Asia/Seoul
    networks:
      - prod-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Reverse Proxy ─────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: prod-npm
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      TZ: Asia/Seoul
    ports:
      - "80:80"
      - "443:443"
      - "81:81"     # 초기 설정 후 방화벽에서 차단 권장
    volumes:
      - npmdata:/data
      - npmcerts:/etc/letsencrypt
    networks:
      - prod-net

  # ── Observability ─────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: prod-loki
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ../config/loki/config.yml:/etc/loki/config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"   # monitor 노드 Grafana datasource
    networks:
      - prod-net

  promtail:
    image: grafana/promtail:latest
    container_name: prod-promtail
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - prod-net
    depends_on:
      - loki

  # ── Exporters (Prometheus scrape 대상) ────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: prod-node-exporter
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"   # monitor 노드 Prometheus scrape
    networks:
      - prod-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: prod-postgres-exporter
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
    environment:
      DATA_SOURCE_NAME: "postgresql://${PG_USER}:${PG_PASSWORD}@prod-postgres:5432/appdb?sslmode=disable"
    ports:
      - "9187:9187"   # monitor 노드 Prometheus scrape
    networks:
      - prod-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Object Storage (Langfuse 이벤트 저장) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: prod-minio
    restart: always
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9001:9001"   # MinIO 콘솔 (관리용)
    volumes:
      - miniodata:/data
    networks:
      - prod-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: prod-minio-init
    networks:
      - prod-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb local/langfuse-events || true;
      exit 0;
      "

networks:
  prod-net:
    name: prod-net
    external: true   # terraform apply 또는 수동: docker network create prod-net

volumes:
  pgdata:
  redisdata:
  lokidata:
  npmdata:
  npmcerts:
  clickhousedata:
  miniodata:
