global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: spring-boot
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['${NODE_A_IP}:9091', '${NODE_A_IP}:9092']

  - job_name: node-exporter
    static_configs:
      - targets: ['${NODE_A_IP}:9100']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['${NODE_A_IP}:9187']
