services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    command: >
      redis-server
      --maxmemory 900mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    networks:
      - prod-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MCP Server (blue/green 불필요, compose로 관리) ────────
  mcp-server:
    image: ghcr.io/${GITHUB_ORG}/mcp-server:${TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: http://langfuse-web:3000
    networks:
      - prod-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Langfuse (self-hosted) ─────────────────────────────────
  langfuse-web:
    image: ghcr.io/langfuse/langfuse:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: https://${LANGFUSE_DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    networks:
      - prod-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  langfuse-worker:
    image: ghcr.io/langfuse/langfuse-worker:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/langfuse
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      SALT: ${LANGFUSE_SALT}
    networks:
      - prod-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Reverse Proxy ─────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "80:80"
      - "443:443"
      - "81:81"     # NPM 관리 UI (초기 설정 후 방화벽에서 차단 권장)
    volumes:
      - npmdata:/data
      - npmcerts:/etc/letsencrypt
    networks:
      - prod-net

  # ── Observability ─────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ../config/loki/config.yml:/etc/loki/config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"   # monitor 노드 Grafana datasource
    networks:
      - prod-net

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - prod-net
    depends_on:
      - loki

networks:
  prod-net:
    name: prod-net
    driver: bridge

volumes:
  pgdata:
  lokidata:
  npmdata:
  npmcerts:
