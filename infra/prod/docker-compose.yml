services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    command: >
      redis-server
      --maxmemory 900mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────
  spring-boot:
    image: ghcr.io/${GITHUB_ORG}/spring-boot:${TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
    environment:
      JAVA_OPTS: "-Xms512m -Xmx3500m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb
      SPRING_DATASOURCE_USERNAME: ${PG_USER}
      SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: http://langfuse-web:3000
    ports:
      - "9091:9091"   # actuator metrics (Prometheus scrape)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nextjs:
    image: ghcr.io/${GITHUB_ORG}/nextjs:${TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      NODE_ENV: production
      API_BASE_URL: http://spring-boot:8080
    depends_on:
      - spring-boot

  mcp-server:
    image: ghcr.io/${GITHUB_ORG}/mcp-server:${TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: http://langfuse-web:3000
    depends_on:
      - spring-boot

  # ── Langfuse (self-hosted) ─────────────────────────────────
  langfuse-web:
    image: ghcr.io/langfuse/langfuse:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: http://${NODE_A_IP}:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  langfuse-worker:
    image: ghcr.io/langfuse/langfuse-worker:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/langfuse
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      SALT: ${LANGFUSE_SALT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Reverse Proxy ─────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
      - "81:81"     # NPM 관리 UI
    volumes:
      - npmdata:/data
      - npmcerts:/etc/letsencrypt

  # ── Observability ─────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ../config/loki/config.yml:/etc/loki/config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"   # Node B Grafana datasource

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

volumes:
  pgdata:
  lokidata:
  npmdata:
  npmcerts:
