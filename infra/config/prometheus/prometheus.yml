global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: spring-boot
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['${NODE_A_IP}:9091']

  - job_name: nextjs
    static_configs:
      - targets: ['${NODE_A_IP}:3000']

  - job_name: mcp-server
    static_configs:
      - targets: ['${NODE_A_IP}:8081']

  - job_name: node-exporter
    static_configs:
      - targets: ['${NODE_A_IP}:9100']
