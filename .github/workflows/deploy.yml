name: Blue/Green Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "back/**"
      - "front/**"
      - "infra/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BE: ${{ github.repository }}-backend
  IMAGE_FE: ${{ github.repository }}-frontend

# ─────────────────────────────────────────────────────────────
# Required Secrets:
#   DOT_ENV_PROD  - 배포 + 앱 설정 전체 (.env 형식)
#                   infra/docker/prod/.env.example 참고
# ─────────────────────────────────────────────────────────────

jobs:
  # ── 1. 다음 버전 태그 계산 ────────────────────────────────
  calculate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.dry_run.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate next tag
        id: dry_run
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

  # ── 2. 이미지 빌드 & GHCR 푸시 ───────────────────────────
  build-and-push:
    needs: calculate-tag
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image paths
        run: |
          echo "BE_IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_BE }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "FE_IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_FE }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./back
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BE_IMAGE }}:${{ needs.calculate-tag.outputs.tag_name }}
            ${{ env.BE_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.FE_IMAGE }}:${{ needs.calculate-tag.outputs.tag_name }}
            ${{ env.FE_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── 3. Blue/Green 배포 ────────────────────────────────────
  deploy:
    needs: [calculate-tag, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse DOT_ENV_PROD
        id: parse
        run: |
          strip() { echo "$1" | sed 's/[[:space:]]*#.*$//' | tr -d '[:space:]'; }
          HOST=$(strip "$(printf '%s' "${{ secrets.DOT_ENV_PROD }}" | grep -E '^HOST=' | cut -d= -f2-)")
          NPM_EMAIL=$(strip "$(printf '%s' "${{ secrets.DOT_ENV_PROD }}" | grep -E '^NPM_EMAIL=' | cut -d= -f2-)")
          NPM_PASSWORD=$(strip "$(printf '%s' "${{ secrets.DOT_ENV_PROD }}" | grep -E '^NPM_PASSWORD=' | cut -d= -f2-)")
          FE_DOMAIN=$(strip "$(printf '%s' "${{ secrets.DOT_ENV_PROD }}" | grep -E '^FE_DOMAIN=' | cut -d= -f2-)")
          BE_DOMAIN=$(strip "$(printf '%s' "${{ secrets.DOT_ENV_PROD }}" | grep -E '^BE_DOMAIN=' | cut -d= -f2-)")
          DOT_ENV_B64=$(printf '%s' "${{ secrets.DOT_ENV_PROD }}" | base64 -w0)

          echo "DEPLOY_HOST=$HOST"         >> $GITHUB_ENV
          echo "NPM_EMAIL=$NPM_EMAIL"      >> $GITHUB_ENV
          echo "NPM_PASSWORD=$NPM_PASSWORD" >> $GITHUB_ENV
          echo "FE_DOMAIN=$FE_DOMAIN"      >> $GITHUB_ENV
          echo "BE_DOMAIN=$BE_DOMAIN"      >> $GITHUB_ENV
          echo "DOT_ENV_B64=$DOT_ENV_B64"  >> $GITHUB_ENV

          # SSH 키는 멀티라인이므로 step output으로 전달
          SSH_KEY=$(printf '%s' "${{ secrets.DOT_ENV_PROD }}" \
            | grep -E '^SSH_KEY_B64=' | cut -d= -f2- | base64 -d)
          echo "ssh_key<<SSHEOF" >> $GITHUB_OUTPUT
          echo "$SSH_KEY"        >> $GITHUB_OUTPUT
          echo "SSHEOF"          >> $GITHUB_OUTPUT

      - name: Sync infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ steps.parse.outputs.ssh_key }}
          source: "infra/docker/prod/docker-compose.yml,infra/docker/config/"
          target: "~/app/"

      - name: Blue-Green Switch via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.calculate-tag.outputs.tag_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          NPM_EMAIL: ${{ env.NPM_EMAIL }}
          NPM_PASSWORD: ${{ env.NPM_PASSWORD }}
          FE_DOMAIN: ${{ env.FE_DOMAIN }}
          BE_DOMAIN: ${{ env.BE_DOMAIN }}
          DOT_ENV_B64: ${{ env.DOT_ENV_B64 }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ steps.parse.outputs.ssh_key }}
          envs: IMAGE_TAG,GITHUB_ACTOR,GITHUB_TOKEN,REPO_OWNER,REPO_NAME,NPM_EMAIL,NPM_PASSWORD,FE_DOMAIN,BE_DOMAIN,DOT_ENV_B64
          script: |
            set -e

            # ── 필수 도구 설치 ─────────────────────────────────
            command -v jq >/dev/null 2>&1 || sudo apt-get install -y -q jq

            # ── .env 복원 ──────────────────────────────────────
            mkdir -p ~/app/infra/docker/prod
            echo "$DOT_ENV_B64" | base64 --decode > ~/app/infra/docker/prod/.env

            # ── 이미지 경로 ────────────────────────────────────
            BE_IMAGE=$(echo "ghcr.io/${REPO_OWNER}/${REPO_NAME}-backend" | tr '[:upper:]' '[:lower:]')
            FE_IMAGE=$(echo "ghcr.io/${REPO_OWNER}/${REPO_NAME}-frontend" | tr '[:upper:]' '[:lower:]')

            # ── GHCR 로그인 ────────────────────────────────────
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # ── Blue/Green 슬롯 판정 ───────────────────────────
            if docker ps --format '{{.Names}}' | grep -q "^be_a$"; then
              BLUE_BE="be_a"; GREEN_BE="be_b"
              BLUE_FE="fe_a"; GREEN_FE="fe_b"
            else
              BLUE_BE="be_b"; GREEN_BE="be_a"
              BLUE_FE="fe_b"; GREEN_FE="fe_a"
            fi
            echo "Blue(현재): $BLUE_BE / Green(신규): $GREEN_BE"

            # ── 새 이미지 Pull ─────────────────────────────────
            docker pull "${BE_IMAGE}:${IMAGE_TAG}"
            docker pull "${FE_IMAGE}:${IMAGE_TAG}"

            # ── Green 기동 ─────────────────────────────────────
            docker rm -f "$GREEN_BE" "$GREEN_FE" 2>/dev/null || true

            docker run -d --name "$GREEN_BE" \
              --network prod-net \
              --memory=4g \
              --env-file ~/app/infra/docker/prod/.env \
              -e JAVA_OPTS="-Xms512m -Xmx3500m" \
              -e SPRING_PROFILES_ACTIVE=prod \
              "${BE_IMAGE}:${IMAGE_TAG}"

            docker run -d --name "$GREEN_FE" \
              --network prod-net \
              --memory=1g \
              -e NODE_ENV=production \
              -e API_BASE_URL="http://${GREEN_BE}:8080" \
              "${FE_IMAGE}:${IMAGE_TAG}"

            # .env 즉시 삭제
            rm -f ~/app/infra/docker/prod/.env

            # ── 헬스체크 ───────────────────────────────────────
            echo "Green BE 헬스체크 대기..."
            MAX_WAIT=90; INTERVAL=5; ELAPSED=0
            GREEN_BE_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$GREEN_BE")
            until curl -sf "http://${GREEN_BE_IP}:8080/actuator/health" | grep -q '"status":"UP"'; do
              if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
                echo "헬스체크 실패 (${MAX_WAIT}s 초과)"
                docker logs "$GREEN_BE" --tail 50
                docker rm -f "$GREEN_BE" "$GREEN_FE"
                exit 1
              fi
              echo "${ELAPSED}s 경과, ${INTERVAL}s 후 재시도..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done
            echo "Green BE 정상 확인"

            # ── NPM API 로그인 ─────────────────────────────────
            TOKEN=$(curl -sf -X POST "http://localhost:81/api/tokens" \
              -H "Content-Type: application/json" \
              -d "{\"identity\":\"${NPM_EMAIL}\",\"secret\":\"${NPM_PASSWORD}\"}" | jq -r .token)
            [[ -z "$TOKEN" || "$TOKEN" == "null" ]] && { echo "NPM 로그인 실패"; exit 1; }

            # ── NPM 백엔드 프록시 전환 ─────────────────────────
            BE_ID=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "http://localhost:81/api/nginx/proxy-hosts" \
              | jq -r ".[] | select(.domain_names[] == \"$BE_DOMAIN\") | .id")
            BE_CFG=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "http://localhost:81/api/nginx/proxy-hosts/$BE_ID")
            NEW_BE_CFG=$(echo "$BE_CFG" | jq --arg h "$GREEN_BE" \
              '{domain_names,forward_scheme,forward_host:$h,forward_port,access_list_id,certificate_id,ssl_forced,caching_enabled,block_exploits,allow_websocket_upgrade,advanced_config,locations,meta}')
            curl -sf -o /dev/null -X PUT \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d "$NEW_BE_CFG" "http://localhost:81/api/nginx/proxy-hosts/$BE_ID"

            # ── NPM 프론트엔드 프록시 전환 ─────────────────────
            FE_ID=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "http://localhost:81/api/nginx/proxy-hosts" \
              | jq -r ".[] | select(.domain_names[] == \"$FE_DOMAIN\") | .id")
            FE_CFG=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "http://localhost:81/api/nginx/proxy-hosts/$FE_ID")
            NEW_FE_CFG=$(echo "$FE_CFG" | jq --arg h "$GREEN_FE" \
              '{domain_names,forward_scheme,forward_host:$h,forward_port,access_list_id,certificate_id,ssl_forced,caching_enabled,block_exploits,allow_websocket_upgrade,advanced_config,locations,meta}')
            curl -sf -o /dev/null -X PUT \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d "$NEW_FE_CFG" "http://localhost:81/api/nginx/proxy-hosts/$FE_ID"

            echo "NPM 트래픽 전환 완료 → $GREEN_BE / $GREEN_FE"

            # ── 이전 Blue 제거 ─────────────────────────────────
            docker stop "$BLUE_BE" "$BLUE_FE" 2>/dev/null || true
            docker rm   "$BLUE_BE" "$BLUE_FE" 2>/dev/null || true
            echo "Blue 제거 완료: $BLUE_BE / $BLUE_FE"

            docker image prune -f

  # ── 4. 태그 & 릴리즈 생성 ────────────────────────────────
  make-tag-and-release:
    needs: [deploy, calculate-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-tag.outputs.tag_name }}
          name: Release ${{ needs.calculate-tag.outputs.tag_name }}
          generate_release_notes: true
