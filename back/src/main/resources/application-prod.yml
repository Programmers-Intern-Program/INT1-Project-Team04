spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://prod-postgres:5432/appdb}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: prod-redis
      port: 6379
      password: ${REDIS_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false