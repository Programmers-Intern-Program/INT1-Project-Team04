spring:
  application:
    name: back
  profiles:
    default: dev
  mail:
    host: ${APP_MAIL_HOST:smtp.gmail.com}
    port: ${APP_MAIL_PORT:587}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${APP_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${APP_MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  health:
    mail:
      enabled: ${APP_MAIL_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  auth:
    session-cookie-name: ${APP_AUTH_SESSION_COOKIE_NAME:SESSION}
    state-cookie-name: ${APP_AUTH_STATE_COOKIE_NAME:OAUTH_STATE}
    session-days: ${APP_AUTH_SESSION_DAYS:14}
    secure-cookies: ${APP_AUTH_SECURE_COOKIES:false}
  oauth:
    kakao:
      client-id: ${APP_OAUTH_KAKAO_CLIENT_ID:}
      client-secret: ${APP_OAUTH_KAKAO_CLIENT_SECRET:}
      redirect-uri: ${APP_OAUTH_KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/oauth/kakao/callback}
    google:
      client-id: ${APP_OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${APP_OAUTH_GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${APP_OAUTH_GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}
    discord:
      client-id: ${APP_OAUTH_DISCORD_CLIENT_ID:}
      client-secret: ${APP_OAUTH_DISCORD_CLIENT_SECRET:}
      redirect-uri: ${APP_OAUTH_DISCORD_REDIRECT_URI:http://localhost:8080/api/auth/oauth/discord/callback}
  notification:
    max-attempts: ${APP_NOTIFICATION_MAX_ATTEMPTS:3}
    retry-delay-seconds: ${APP_NOTIFICATION_RETRY_DELAY_SECONDS:300}
    email:
      enabled: ${APP_NOTIFICATION_EMAIL_ENABLED:false}
      from: ${APP_NOTIFICATION_EMAIL_FROM:}
    discord:
      enabled: ${APP_NOTIFICATION_DISCORD_ENABLED:false}
      bot-token: ${APP_NOTIFICATION_DISCORD_BOT_TOKEN:}
      api-base-url: ${APP_NOTIFICATION_DISCORD_API_BASE_URL:https://discord.com/api/v10}
    telegram:
      enabled: ${APP_NOTIFICATION_TELEGRAM_ENABLED:false}
      bot-token: ${APP_NOTIFICATION_TELEGRAM_BOT_TOKEN:}
      api-base-url: ${APP_NOTIFICATION_TELEGRAM_API_BASE_URL:https://api.telegram.org}
